<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Lakay Pale — Asistan AI Ayisyen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0f1e;--bg2:#0f1628;--bg3:#141e35;--blue:#3b6fd4;--blue2:#5b8ee8;--red:#c0392b;--gold:#f5a623;--cream:#f0f4ff;--muted:#6b82a8;--brd:rgba(59,111,212,.2);--grn:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--brd);padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:.65rem}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--blue),#1a3a8f);display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 0 16px rgba(59,111,212,.35)}
.logo-text{font-size:1rem;font-weight:700;color:var(--cream)}
.logo-sub{font-size:.6rem;color:var(--muted);font-weight:400}
.header-r{display:flex;align-items:center;gap:.5rem}
.status-badge{display:flex;align-items:center;gap:.3rem;font-size:.65rem;color:var(--grn);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);border-radius:99px;padding:.2rem .6rem}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--grn);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* FLAG STRIPE */
.flag-stripe{height:3px;background:linear-gradient(90deg,#003087 50%,var(--red) 50%)}

/* LANG TABS */
.lang-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--brd);padding:.5rem 1.25rem;gap:.4rem}
.ltab{padding:.3rem .8rem;border-radius:8px;font-size:.7rem;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .18s;color:var(--muted);background:transparent}
.ltab.on{background:rgba(59,111,212,.2);border-color:rgba(59,111,212,.4);color:var(--blue2)}

/* STATS BAR */
.stats{display:flex;gap:0;border-bottom:1px solid var(--brd);flex-shrink:0}
.stat{flex:1;padding:.65rem .5rem;text-align:center;border-right:1px solid var(--brd)}
.stat:last-child{border-right:none}
.stat-n{font-size:1.1rem;font-weight:700;color:var(--blue2)}
.stat-l{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:.85rem}
.msg{display:flex;gap:.55rem;align-items:flex-start;animation:up .25s ease}
@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.msg.bot .av{background:linear-gradient(135deg,var(--blue),#1a3a8f);border:1px solid rgba(59,111,212,.3)}
.msg.user .av{background:rgba(59,111,212,.15);border:1px solid rgba(59,111,212,.2)}
.bubble{max-width:80%;padding:.7rem .9rem;font-size:.83rem;line-height:1.75}
.msg.bot .bubble{background:var(--bg3);border:1px solid var(--brd);color:var(--cream);border-radius:4px 14px 14px 14px}
.msg.user .bubble{background:linear-gradient(135deg,rgba(59,111,212,.25),rgba(26,58,143,.2));border:1px solid rgba(59,111,212,.3);color:var(--cream);border-radius:14px 4px 14px 14px;text-align:right}
.msg-time{font-size:.52rem;color:var(--muted);margin-top:.25rem;opacity:.45}
.typing{display:flex;align-items:center;gap:.25rem;padding:.5rem .75rem;background:var(--bg3);border:1px solid var(--brd);border-radius:4px 13px 13px 13px;width:fit-content}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--blue2);animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* QUICK ACTIONS */
.quick-actions{padding:.6rem 1.25rem;display:flex;gap:.4rem;flex-wrap:wrap;border-top:1px solid var(--brd);flex-shrink:0}
.qa-btn{font-size:.65rem;padding:.25rem .65rem;border-radius:99px;border:1px solid rgba(59,111,212,.25);background:rgba(59,111,212,.08);color:var(--blue2);cursor:pointer;transition:all .18s;white-space:nowrap;font-family:"DM Sans",sans-serif}
.qa-btn:hover{background:rgba(59,111,212,.2);border-color:rgba(59,111,212,.45)}

/* INPUT */
.input-area{padding:.85rem 1.25rem;border-top:1px solid var(--brd);background:var(--bg2);flex-shrink:0}
.input-row{display:flex;gap:.45rem;align-items:flex-end}
.inp{flex:1;background:var(--bg3);border:1px solid rgba(59,111,212,.25);border-radius:11px;padding:.7rem .9rem;font-family:"DM Sans",sans-serif;font-size:.83rem;color:var(--cream);outline:none;resize:none;min-height:42px;max-height:110px;line-height:1.55;transition:border-color .2s}
.inp::placeholder{color:rgba(107,130,168,.5)}
.inp:focus{border-color:rgba(59,111,212,.55);box-shadow:0 0 0 3px rgba(59,111,212,.07)}
.send-btn{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--blue),#1a3a8f);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .22s;flex-shrink:0;box-shadow:0 4px 14px rgba(59,111,212,.35);color:white}
.send-btn:hover{transform:translateY(-2px);box-shadow:0 7px 22px rgba(59,111,212,.5)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.input-hint{font-size:.58rem;color:var(--muted);margin-top:.4rem;opacity:.5;text-align:center}

/* FOOTER */
.footer{padding:.5rem 1.25rem;border-top:1px solid var(--brd);text-align:center;font-size:.6rem;color:var(--muted);flex-shrink:0;background:var(--bg2)}
.footer a{color:var(--blue2);text-decoration:none}

/* PROVERB */
.proverb-bar{padding:.4rem 1.25rem;background:rgba(59,111,212,.05);border-bottom:1px solid var(--brd);font-size:.65rem;color:var(--muted);font-style:italic;text-align:center}
.proverb-bar strong{color:var(--gold)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🏠</div>
    <div>
      <div class="logo-text">Lakay Pale</div>
      <div class="logo-sub">Asistan AI Ayisyen · KreyòlAIHub</div>
    </div>
  </div>
  <div class="header-r">
    <div class="status-badge"><span class="status-dot"></span>Live AI</div>
  </div>
</div>

<div class="flag-stripe"></div>

<div class="lang-tabs">
  <button class="ltab on" onclick="setLang('ht')" id="lt-ht">🇭🇹 Kreyòl</button>
  <button class="ltab" onclick="setLang('fr')" id="lt-fr">🇫🇷 Français</button>
  <button class="ltab" onclick="setLang('en')" id="lt-en">🇬🇧 English</button>
</div>

<div class="proverb-bar"><strong>"Espwa fè viv"</strong> — L'espoir fait vivre · Hope keeps us alive 🇭🇹</div>

<div class="stats">
  <div class="stat"><div class="stat-n">500+</div><div class="stat-l">Patisipan</div></div>
  <div class="stat"><div class="stat-n">02</div><div class="stat-l">Arena</div></div>
  <div class="stat"><div class="stat-n">3</div><div class="stat-l">Lang</div></div>
  <div class="stat"><div class="stat-n">UK</div><div class="stat-l">Baz</div></div>
</div>

<div class="chat" id="chat"></div>

<div class="quick-actions">
  <button class="qa-btn" onclick="ask('Kijan mwen ka fè lajan ak AI?')">💰 Fè lajan ak AI</button>
  <button class="qa-btn" onclick="ask('Kisa ki ChatGPT?')">🤖 ChatGPT</button>
  <button class="qa-btn" onclick="ask('Tradui: Thank you very much')">🌐 Tradui</button>
  <button class="qa-btn" onclick="ask('Ki pwovèb Ayisyen ou konnen?')">📖 Pwovèb</button>
  <button class="qa-btn" onclick="ask('Kijan pou m aprann AI?')">🎓 Aprann AI</button>
  <button class="qa-btn" onclick="ask('Ki nouvèl nan domèn AI?')">📰 Nouvèl AI</button>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea class="inp" id="inp" rows="1" placeholder="Pale oswa ekri an Kreyòl..."></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">→</button>
  </div>
  <div class="input-hint" id="hint">Ekri an Kreyòl, Fransè, oswa Anglè — Lakay Pale konprann twa lang yo</div>
</div>

<div class="footer">
  <strong>Lakay Pale</strong> · Kreye pa <a href="https://kreyolaihub.com">ALASODIGITAL · KreyòlAIHub</a> · London 🇬🇧🇭🇹
</div>

<script>
var WORKER = "https://kreyolaihub-proxy.kreyolaihub.workers.dev";
var lang = "ht";
var hist = [];
var busy = false;

var SYSTEM = {
  ht: "Ou se Lakay Pale, premye asistan AI ki pale Kreyol Ayisyen. Ou reponn an Kreyol Ayisyen pa defo, men ou konprann Fransè ak Anglè tou. Ou ede pèp Ayisyen ak tout sijè: AI, lajan, travay, edikasyon, kiltirèl, tradiksyon, istwa, ak lòt bagay. Ou cho, itil, ak fyè dèt kiltirèl Ayisyen. Lè ou ka, itilize yon pwovèb Ayisyen. Reponn nan lang moun nan pale avèk ou.",
  fr: "Tu es Lakay Pale, le premier assistant IA parlant créole haïtien. Tu réponds en français dans ce mode mais comprends aussi le créole et l'anglais. Tu aides les Haïtiens avec tous les sujets: IA, argent, travail, éducation, culture, traduction et plus. Tu es chaleureux, utile et fier du patrimoine haïtien.",
  en: "You are Lakay Pale, the first AI assistant speaking Haitian Creole. You respond in English in this mode but understand Creole and French too. You help Haitians with all topics: AI, money, work, education, culture, translation and more. You are warm, helpful and proud of Haitian heritage."
};

var WELCOME = {
  ht: "Bonjou! Mwen se <strong>Lakay Pale</strong> 🇭🇹<br><br>Mwen se premye asistan AI Ayisyen. Mwen pale Kreyòl, Fransè, ak Anglè.<br><br>Kijan mwen ka ede w jodi a?",
  fr: "Bonjour! Je suis <strong>Lakay Pale</strong> 🇭🇹<br><br>Je suis le premier assistant IA haïtien. Je parle créole, français et anglais.<br><br>Comment puis-je vous aider aujourd'hui?",
  en: "Hello! I'm <strong>Lakay Pale</strong> 🇭🇹<br><br>I'm the first Haitian AI assistant. I speak Creole, French, and English.<br><br>How can I help you today?"
};

var HINTS = {
  ht: "Ekri an Kreyòl, Fransè, oswa Anglè — Lakay Pale konprann twa lang yo",
  fr: "Écrivez en créole, français ou anglais — Lakay Pale comprend les trois",
  en: "Write in Creole, French, or English — Lakay Pale understands all three"
};

var PLACEHOLDERS = {
  ht: "Pale oswa ekri an Kreyòl...",
  fr: "Parlez ou écrivez en français...",
  en: "Speak or write in English..."
};

function setLang(l) {
  lang = l;
  ["ht","fr","en"].forEach(function(x){
    document.getElementById("lt-"+x).className = "ltab"+(x===l?" on":"");
  });
  document.getElementById("inp").placeholder = PLACEHOLDERS[l];
  document.getElementById("hint").textContent = HINTS[l];
}

function now() {
  return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
}

function addMsg(role, html) {
  var chat = document.getElementById("chat");
  var d = document.createElement("div");
  d.className = "msg " + role;
  var av = role === "user" ? '<div class="av">👤</div>' : '<div class="av">🏠</div>';
  d.innerHTML = av + '<div><div class="bubble">' + html + '</div><div class="msg-time">' + now() + '</div></div>';
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  var chat = document.getElementById("chat");
  var d = document.createElement("div");
  d.id = "typing"; d.className = "msg bot";
  d.innerHTML = '<div class="av">🏠</div><div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  var d = document.getElementById("typing");
  if(d) d.remove();
}

function ask(q) {
  document.getElementById("inp").value = q;
  send();
}

async function send() {
  var inp = document.getElementById("inp");
  var txt = inp.value.trim();
  if(!txt || busy) return;
  inp.value = ""; inp.style.height = "auto";
  busy = true;
  document.getElementById("sendBtn").disabled = true;

  addMsg("user", txt.replace(/</g,"&lt;"));
  hist.push({role:"user", content:txt});
  showTyping();

  try {
    var res = await fetch(WORKER, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 800,
        system: SYSTEM[lang] || SYSTEM.ht,
        messages: hist.slice(-14)
      })
    });
    var data = await res.json();
    var reply = (data.content && data.content[0]) ? data.content[0].text : "Eseye ankò / Try again.";
    hideTyping();
    var fmt = reply
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/\n\n/g,"<br><br>").replace(/\n/g,"<br>")
      .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
      .replace(/\*(.*?)\*/g,"<em>$1</em>");
    addMsg("bot", fmt);
    hist.push({role:"assistant", content:reply});
  } catch(e) {
    hideTyping();
    addMsg("bot", "Koneksyon echwe. Eseye ankò, souple. 🌺");
  }
  busy = false;
  document.getElementById("sendBtn").disabled = false;
}

var inp = document.getElementById("inp");
inp.addEventListener("input", function(){
  this.style.height="auto";
  this.style.height = Math.min(this.scrollHeight,110)+"px";
});
inp.addEventListener("keydown", function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}
});

// Init
setLang("ht");
addMsg("bot", WELCOME.ht);
</script>
</body>
</html>
